name: CI

# Lint + build gate (repo has no tests yet). Triggerable via `gh workflow run ci.yml`.
# factory/** push trigger supports the worker's branch-gated main promotion.
on:
  workflow_dispatch:
  push:
    branches: [main, "factory/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # prisma generate / next build need a DATABASE_URL set; no DB is contacted.
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db?schema=public"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm ci

      # Lint intentionally omitted: 54 pre-existing errors (require() imports in
      # scripts/, broken test-workflow.js). Gate = "builds". Re-add lint after the
      # cleanup task lands.
      - name: Build
        run: npm run build
