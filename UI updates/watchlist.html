<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Watchlist — Unity Oracle Aggregator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
  <style>
    @import url('https://fonts.cdnfonts.com/css/cabinet-grotesk');
    .wl-card { padding: var(--space-6); }
    .wl-input-row { display: flex; gap: var(--space-3); align-items: center; flex-wrap: wrap; }
    .wl-input-row input { flex: 1; min-width: 200px; }
    .alert-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; margin-bottom: 8px; }
    .alert-row .price { font-family: var(--font-mono); font-size: var(--text-sm); }
    .price-target { display: flex; align-items: center; gap: var(--space-2); }
    .price-target input { width: 120px; padding: 6px 12px; background: rgba(255,255,255,0.04); border: 1px solid var(--border-glass); border-radius: var(--radius-pill); color: var(--fg); font-size: var(--text-sm); min-height: 36px; }
    .price-target input:focus { outline: none; border-color: var(--accent); }
    @media (max-width: 767px) { .wl-input-row input { min-width: 140px; } }
  </style>
</head>
<body class="bg-gradient">
  <nav class="nav-bar">
    <div class="logo">
      <span class="accent-dot"></span>
      Unity Oracle
      <div class="glass logo-dropdown" id="logoDropdown">
        <a href="profile.html" class="dd-item">
          <div class="dd-icon" style="background:linear-gradient(135deg,#5865F2,#7289da);color:#fff;">●</div>
          Profile
        </a>
        <a href="settings.html" class="dd-item">
          <div class="dd-icon" style="background:rgba(255,255,255,0.08);color:var(--fg-2);">⚙</div>
          Settings
        </a>
      </div>
    </div>
    <div class="nav-actions">
      <a href="index.html" style="display:flex;">
        <button class="icon-btn" title="All screens">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </button>
      </a>
    </div>
  </nav>

  <main class="page">
    <div class="section-header">
      <h2>Watchlist</h2>
      <div class="row gap-3">
        <span class="badge badge-accent" id="wlCount">3 assets</span>
        <button class="btn btn-ghost btn-sm">Import</button>
      </div>
    </div>

    <!-- Add asset -->
    <div class="glass wl-card" style="margin-bottom:var(--space-6);">
      <div class="wl-input-row">
        <input type="text" id="wlInput" placeholder="Search symbol or name…" />
        <button class="btn btn-primary btn-shine" id="wlAddBtn">+ Add to Watchlist</button>
      </div>
      <div style="margin-top:var(--space-3);">
        <span style="font-size:var(--text-xs);color:var(--muted);">Suggestions: </span>
        <button class="btn btn-ghost btn-sm suggest-token" data-symbol="BTC">BTC</button>
        <button class="btn btn-ghost btn-sm suggest-token" data-symbol="ETH">ETH</button>
        <button class="btn btn-ghost btn-sm suggest-token" data-symbol="SOL">SOL</button>
        <button class="btn btn-ghost btn-sm suggest-token" data-symbol="ARB">ARB</button>
        <button class="btn btn-ghost btn-sm suggest-token" data-symbol="OP">OP</button>
        <button class="btn btn-ghost btn-sm suggest-token" data-symbol="LINK">LINK</button>
      </div>
    </div>

    <!-- Watchlist entries -->
    <div id="wlList"></div>

    <!-- Price alerts section -->
    <div class="glass wl-card" style="margin-top:var(--space-6);">
      <div class="section-header">
        <h2>Price Alerts</h2>
        <button class="btn btn-ghost btn-sm">+ New Alert</button>
      </div>
      <div class="alert-row glass-sm">
        <div class="row gap-3">
          <span style="font-weight:600;font-family:var(--font-mono);">BTC</span>
          <span class="price-target">
            <span style="font-size:var(--text-sm);color:var(--muted);">above</span>
            <input type="text" value="$75,000" />
          </span>
        </div>
        <div class="row gap-2">
          <span class="badge badge-accent">Active</span>
          <button class="btn btn-ghost btn-sm" style="color:var(--muted);padding:4px 8px;">✕</button>
        </div>
      </div>
      <div class="alert-row glass-sm">
        <div class="row gap-3">
          <span style="font-weight:600;font-family:var(--font-mono);">ETH</span>
          <span class="price-target">
            <span style="font-size:var(--text-sm);color:var(--muted);">below</span>
            <input type="text" value="$3,200" />
          </span>
        </div>
        <div class="row gap-2">
          <span class="badge badge-accent">Active</span>
          <button class="btn btn-ghost btn-sm" style="color:var(--muted);padding:4px 8px;">✕</button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
